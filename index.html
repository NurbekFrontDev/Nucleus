<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Анти-мигание: ставим тему до загрузки React
      (function () {
        try {
          if (localStorage.getItem('finlit-theme') !== 'light') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Nucleus — приложение для финансов, планирования дня и привычек."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nucleus" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nucleus" />
    <meta
      property="og:description"
      content="Финансы, планировщик дня и привычки — всё в одном месте."
    />
    <meta property="og:image" content="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Nucleus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
