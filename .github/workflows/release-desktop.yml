# Автосборка Windows-установщика Nucleus и публикация в GitHub Releases.
# Запуск при пуше тега вида v* (например v0.1.4).
name: release-desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 
          TAURI_SIGNING_PRIVATE_KEY: $ secrets.TAURI_SIGNING_PRIVATE_KEY 
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: $ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD 
          VITE_SUPABASE_URL: $ secrets.VITE_SUPABASE_URL 
          VITE_SUPABASE_ANON_KEY: $ secrets.VITE_SUPABASE_ANON_KEY 
        with:
          tagName: $ github.ref_name 
          releaseName: 'Nucleus $ github.ref_name '
          releaseBody: 'Автоматическое обновление Nucleus.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # Загружаем установщик и latest.json в Supabase Storage (бакет releases),
      # чтобы авто-обновление шло через Supabase, а не через GitHub CDN.
      - name: Upload to Supabase Storage (auto-update)
        shell: pwsh
        env:
          SUPABASE_URL: https://ewgrcmswwvbtoxdxkvuv.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: $ secrets.SUPABASE_SERVICE_ROLE_KEY 
        run: |
          $bundle = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem -Path $bundle -Filter *-setup.exe | Select-Object -First 1
          $sig = Get-ChildItem -Path $bundle -Filter *-setup.exe.sig | Select-Object -First 1
          if (-not $exe -or -not $sig) { throw "NSIS installer or .sig not found in $bundle" }
          $version = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $api = "$env:SUPABASE_URL/storage/v1/object/releases"
          $pub = "$env:SUPABASE_URL/storage/v1/object/public/releases"
          $exeHeaders = @{ Authorization = "Bearer $env:SUPABASE_SERVICE_ROLE_KEY"; "x-upsert" = "true"; "Content-Type" = "application/octet-stream" }
          Invoke-RestMethod -Method Post -Uri "$api/$($exe.Name)" -Headers $exeHeaders -InFile $exe.FullName
          $latest = [ordered]@{ version = $version; pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ"); platforms = @{ "windows-x86_64" = @{ signature = $signature; url = "$pub/$($exe.Name)" } } }
          $latestPath = Join-Path $env:RUNNER_TEMP "latest.json"
          $latest | ConvertTo-Json -Depth 6 | Out-File -FilePath $latestPath -Encoding utf8
          $jsonHeaders = @{ Authorization = "Bearer $env:SUPABASE_SERVICE_ROLE_KEY"; "x-upsert" = "true"; "Content-Type" = "application/json" }
          Invoke-RestMethod -Method Post -Uri "$api/latest.json" -Headers $jsonHeaders -InFile $latestPath
